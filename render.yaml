services:
  # WatchDogs Backend Web Service
  - type: web
    name: watchdogs-backend
    env: node
    plan: free
    rootDir: WatchDogs/watchdogs-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
